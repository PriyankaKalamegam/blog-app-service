spring.application.name=blog-app-service

# H2 in-memory datastore for local/dev mock data.
spring.datasource.url=jdbc:h2:mem:blogdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Auto-create schema for each run.
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=false

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT defaults (override in production).
app.jwt.secret=${JWT_SECRET:change-this-secret-in-prod-change-this-secret-in-prod}
app.jwt.expiration-seconds=${JWT_EXPIRATION_SECONDS:86400}
