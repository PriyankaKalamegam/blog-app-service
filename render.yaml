services:
  - type: web
    name: devlog-platform-api
    runtime: docker
    plan: free
    region: singapore
    branch: main
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/tags
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRATION_SECONDS
        value: "86400"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://proj.devlog.platform.vercel.app,https://projdevlogplatform.vercel.app"
